<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Cover</title>
<link href="https://fonts.googleapis.com/css2?family={{FONT}}:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  .card {
    width: 1080px;
    height: 1350px;
    background:
      radial-gradient(ellipse 900px 900px at 100% 0%, color-mix(in srgb, {{PRIMARY_COLOR}} 40%, #000) 0%, transparent 70%),
      radial-gradient(circle 1200px at -10% 105%, {{PRIMARY_COLOR}} 0%, color-mix(in srgb, {{PRIMARY_COLOR}} 50%, transparent) 25%, transparent 75%),
      #01101A;
    position: relative;
    overflow: hidden;
    font-family: '{{FONT}}', sans-serif;
  }
  .content {
    position: absolute;
    bottom: 200px;
    left: 90px;
    right: 90px;
  }
  .title {
    font-weight: 900;
    font-size: 88px;
    color: #fff;
    line-height: 1.3;
    margin-bottom: 32px;
  }
  .subtitle {
    font-weight: 500;
    font-size: 44px;
    color: {{SECONDARY_COLOR}};
    line-height: 1.5;
  }
  .handle {
    position: absolute;
    bottom: 72px;
    left: 90px;
    font-size: 33px;
    font-weight: 600;
    color: rgba(255,255,255,0.3);
  }
</style>
</head>
<body>
<div class="card">
  <div class="content">
    <h1 class="title">Your Main Title<br>Goes Here</h1>
    <p class="subtitle">Your subtitle or hook line</p>
  </div>
  <span class="handle">{{HANDLE}}</span>
</div>
</body>
</html>
