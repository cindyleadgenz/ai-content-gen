<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Content Slide</title>
<link href="https://fonts.googleapis.com/css2?family={{FONT}}:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  .card {
    width: 1080px;
    height: 1350px;
    background:
      radial-gradient(ellipse 900px 900px at 100% 0%, color-mix(in srgb, {{PRIMARY_COLOR}} 40%, #000) 0%, transparent 70%),
      #01101A;
    position: relative;
    overflow: hidden;
    font-family: '{{FONT}}', sans-serif;
    padding: 90px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .pill {
    display: inline-block;
    background: color-mix(in srgb, {{SECONDARY_COLOR}} 15%, transparent);
    border: 1px solid color-mix(in srgb, {{SECONDARY_COLOR}} 40%, transparent);
    color: {{SECONDARY_COLOR}};
    border-radius: 6px;
    padding: 8px 24px;
    font-size: 30px;
    font-weight: 600;
    margin-bottom: 48px;
  }
  .title {
    font-size: 72px;
    font-weight: 900;
    color: #fff;
    line-height: 1.3;
    margin-bottom: 48px;
  }
  .title .accent { color: {{PRIMARY_COLOR}}; }
  .bullets { list-style: none; display: flex; flex-direction: column; gap: 28px; }
  .bullets li {
    font-size: 40px;
    font-weight: 400;
    color: rgba(255,255,255,0.88);
    line-height: 1.5;
    padding-left: 52px;
    position: relative;
  }
  .bullets li::before {
    content: "→";
    color: {{PRIMARY_COLOR}};
    position: absolute;
    left: 0;
    font-weight: 700;
  }
  .handle {
    position: absolute;
    bottom: 72px;
    right: 90px;
    font-size: 30px;
    font-weight: 600;
    color: rgba(255,255,255,0.3);
  }
</style>
</head>
<body>
<div class="card">
  <span class="pill">Label / Category</span>
  <h2 class="title">Slide <span class="accent">Headline</span> Here</h2>
  <ul class="bullets">
    <li>First key point goes here</li>
    <li>Second key point goes here</li>
    <li>Third key point goes here</li>
  </ul>
  <span class="handle">{{HANDLE}}</span>
</div>
</body>
</html>
